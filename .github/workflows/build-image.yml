name: Build KoboldCpp Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image coordinates
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/koboldcpp-custom
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build Docker image
        run: |
          docker build \
            --tag "$IMAGE_NAME:${{ github.sha }}" \
            --tag "$IMAGE_NAME:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "$IMAGE_NAME:${{ github.sha }}"
          docker push "$IMAGE_NAME:latest"

      - name: Export Docker image
        run: |
          mkdir -p artifacts
          docker save "$IMAGE_NAME:${{ github.sha }}" | gzip > artifacts/koboldcpp-custom-${{ github.sha }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: koboldcpp-image-${{ github.sha }}
          path: artifacts/koboldcpp-custom-${{ github.sha }}.tar.gz
          retention-days: 14
