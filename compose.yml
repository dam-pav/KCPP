# Environment variables requiered:
#KCPP_MODEL_FILE=model.gguf
#KCPP_MODELS_PATH=local_path_to_models
#KCPP_IMAGE=ghcr.io/dam-pav/koboldcpp-custom:latestversion: "3.9"

services:
  koboldcpp:
    image: ${KCPP_IMAGE:-koboldcpp-custom:homoai}
    container_name: koboldcpp
    environment:
      KCPP_MODEL: "/app/models/${KCPP_MODEL_FILE}"
      KCPP_ARGS: >
        --usecublas
        --tensor-split 1 1
        --contextsize 131072
        --gpulayers 31
        --flashattention
        --quantkv 2
        --lowvram
        --threads 16

      KCPP_HOST: "0.0.0.0"
      KCPP_PORT: "5001"

      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

    volumes:
      - ${KCPP_MODELS_PATH}:/app/models
    ports:
      - "5001:5001"
    # For Docker 29 compose (non-swarm), this is the important bit:
    gpus: "all"
    restart: unless-stopped
